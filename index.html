<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Reggio Calabria Club · cleaning & drinks</title>
    <!-- jsPDF and autoTable -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #e8ecf2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
            margin: 0;
        }
        .roster-card {
            max-width: 1400px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 35px -8px rgba(0, 20, 30, 0.25);
            overflow: hidden;
            border: 1px solid #d6dee7;
        }
        .header {
            background: #1e2b3a;
            padding: 1.2rem 1.5rem;
            color: white;
        }
        .club-name {
            font-size: 1.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .club-name span {
            background: #c49a2b;
            color: #1e2b3a;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.2rem 1rem;
            border-radius: 30px;
        }
        .date-picker-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 0.8rem;
            flex-wrap: wrap;
            background: #2a3a4b;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
        }
        .date-picker-row label {
            color: #e0edf5;
            font-size: 0.9rem;
        }
        .date-picker-row input[type="date"] {
            background: white;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 30px;
            font-size: 0.9rem;
            color: #0b1a26;
            border: 1px solid #b9c9da;
        }
        .legend {
            display: flex;
            gap: 1.2rem;
            color: #ccdbe9;
            font-size: 0.8rem;
            margin-left: auto;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            min-width: 800px;
        }
        th {
            background: #f1f5f9;
            color: #1e2b3a;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.7rem 0.2rem;
            text-align: center;
            border-bottom: 2px solid #cbd5e1;
            border-right: 1px solid #dde5ed;
        }
        th:last-child { border-right: none; }
        td {
            padding: 0.5rem 0.2rem;
            border-bottom: 1px solid #e6edf4;
            text-align: center;
            vertical-align: middle;
            background: white;
        }
        .room-col {
            background: #f9fcff;
            font-weight: 600;
            color: #14222e;
            text-align: left;
            padding-left: 0.8rem;
            font-size: 0.9rem;
            border-right: 1px solid #d2dde9;
            width: 130px;
        }
        .room-code {
            display: inline-block;
            background: #dde5f0;
            border-radius: 30px;
            padding: 0.1rem 0.5rem;
            font-size: 0.6rem;
            font-weight: 700;
            margin-left: 5px;
        }
        .signoff {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .signoff input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #8b1e1e;
        }
        .signoff input[type="number"] {
            width: 65px;
            padding: 4px;
            border: 1px solid #b9c9da;
            border-radius: 30px;
            font-size: 0.7rem;
            text-align: center;
        }
        .total-col {
            font-weight: 600;
            background: #f0f5fb;
            width: 70px;
            border-left: 1px solid #d2dde9;
        }
        .badge-section {
            background: #f8fafd;
            padding: 0.8rem 1.5rem;
            border-top: 2px solid #d9e2ec;
            border-bottom: 1px solid #d9e2ec;
        }
        .complete-badge {
            background: #2b7a4b;
            color: white;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .footer-bar {
            background: #f0f4fa;
            padding: 1rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .footer-note {
            font-size: 0.85rem;
            color: #2b3f52;
        }
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .btn {
            background: #1e2b3a;
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            border: 1px solid #1e2b3a;
            flex: 1 0 auto;
            min-width: 120px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn.cleaner {
            background: #8b1e1e;
            border-color: #8b1e1e;
        }
        .btn.drinks {
            background: #2b7a4b;
            border-color: #2b7a4b;
        }
        .btn.consolidated {
            background: #1e2b3a;
            border-color: #1e2b3a;
        }
        .btn:active {
            filter: brightness(0.9);
        }
        @media (max-width: 600px) {
            .button-group .btn {
                flex: 1 1 100%;
            }
            .date-picker-row {
                flex-direction: column;
                align-items: stretch;
            }
            .legend {
                margin-left: 0;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<div class="roster-card">
    <div class="header">
        <div class="club-name">
            Reggio Calabria Club <span>cleaning & drinks</span>
        </div>
        <div class="date-picker-row">
            <label for="startDate">📅 Week starting Tuesday:</label>
            <input type="date" id="startDate" value="">
            <div class="legend">

    <!-- Input table -->
    <div class="table-wrapper">

            <tbody>
                <tr id="row-ML">

                    <td><div class="signoff"><input type="checkbox" class="clean-check"><input type="number" min="0" value="0" class="guest-count"></div></td>
                    <td><div class="signoff"><input type="checkbox" class="clean-check"><input type="number" min="0" value="0" class="guest-count"></div></td>
                    <td><div class="signoff"><input type="checkbox" class="clean-check"><input type="number" min="0" value="0" class="guest-count"></div></td>
                    <td><div class="signoff"><input type="checkbox" class="clean-check"><input type="number" min="0" value="0" class="guest-count"></div></td>
                    <td><div class="signoff"><input type="checkbox" class="clean-check"><input type="number" min="0" value="0" class="guest-count"></div></td>
                    <td><div class="signoff"><input type="checkbox" class="clean-check"><input type="number" min="0" value="0" class="guest-count"></div></td>
                    <td><div class="signoff"><input type="checkbox" class="clean-check"><input type="number" min="0" value="0" class="guest-count"></div></td>

                </tr>

                    <td class="room-col">Bistroteca <span class="room-code">BT</span></td>
                    <td><div class="signoff"><input type="checkbox" class="clean-check"><input type="number" min="0" value="0" class="guest-count"></div></td>
                    <td><div class="signoff"><input type="checkbox" class="clean-check"><input type="number" min="0" value="0" class="guest-count"></div></td>
                    <td><div class="signoff"><input type="checkbox" class="clean-check"><input type="number" min="0" value="0" class="guest-count"></div></td>
                    <td><div class="signoff"><input type="checkbox" class="clean-check"><input type="number" min="0" value="0" class="guest-count"></div></td>
                    <td><div class="signoff"><input type="checkbox" class="clean-check"><input type="number" min="0" value="0" class="guest-count"></div></td>
                    <td><div class="signoff"><input type="checkbox" class="clean-check"><input type="number" min="0" value="0" class="guest-count"></div></td>
                    <td><div class="signoff"><input type="checkbox" class="clean-check"><input type="number" min="0" value="0" class="guest-count"></div></td>
                    <td class="total-col">0</td>
                </tr>
                <tr id="row-OR">
                    <td class="room-col">Ottimo Room <span class="room-code">OR</span></td>
                    <td><div class="signoff"><input type="checkbox" class="clean-check"><input type="number" min="0" value="0" class="guest-count"></div></td>
                    <td><div class="signoff"><input type="checkbox" class="clean-check"><input type="number" min="0" value="0" class="guest-count"></div></td>

                    <td><div class="signoff"><input type="checkbox" class="clean-check"><input type="number" min="0" value="0" class="guest-count"></div></td>
                    <td><div class="signoff"><input type="checkbox" class="clean-check"><input type="number" min="0" value="0" class="guest-count"></div></td>
                    <td><div class="signoff"><input type="checkbox" class="clean-check"><input type="number" min="0" value="0" class="guest-count"></div></td>
                    <td><div class="signoff"><input type="checkbox" class="clean-check"><input type="number" min="0" value="0" class="guest-count"></div></td>
                    <td class="total-col">0</td>
                </tr>
                <tr id="row-SR">
                    <td class="room-col">Sala Reggio Ballroom <span class="room-code">SR</span></td>
                    <td><div class="signoff"><input type="checkbox" class="clean-check"><input type="number" min="0" value="0" class="guest-count"></div></td>
                    <td><div class="signoff"><input type="checkbox" class="clean-check"><input type="number" min="0" value="0" class="guest-count"></div></td>
                    <td><div class="signoff"><input type="checkbox" class="clean-check"><input type="number" min="0" value="0" class="guest-count"></div></td>
                    <td><div class="signoff"><input type="checkbox" class="clean-check"><input type="number" min="0" value="0" class="guest-count"></div></td>
                    <td><div class="signoff"><input type="checkbox" class="clean-check"><input type="number" min="0" value="0" class="guest-count"></div></td>
                    <td><div class="signoff"><input type="checkbox" class="clean-check"><input type="number" min="0" value="0" class="guest-count"></div></td>

    <div class="badge-section">

    <div class="footer-bar">
        <div class="footer-note">🧹 Tick cleaning · 👥 Enter guests</div>
        <div class="button-group">
            <button class="btn cleaner" onclick="openCleanerSheet()">🧹 Cleaner summary</button>
            <button class="btn drinks" onclick="openDrinksSheet()">🍷 Drinks summary</button>

            <button class="btn" onclick="window.print()">🖨️ Print main</button>
        </div>

</div>

<script>
(function() {
    // ================== DATA PERSISTENCE ==================
    const STORAGE_KEY = 'reggioCalabriaData';
    const rows = document.querySelectorAll('tbody tr');
    const dayIds = ['Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun', 'Mon'];
    const roomNames = {
        'row-ML': 'Members Lounge',
        'row-BT': 'Bistroteca',
        'row-OR': 'Ottimo Room',
        'row-SR': 'Sala Reggio Ballroom'
    };

    function loadFromStorage() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return;
        try {
            const data = JSON.parse(saved);
            rows.forEach(row => {
                const checkboxes = row.querySelectorAll('input.clean-check');
                const guestInputs = row.querySelectorAll('input.guest-count');
                const rowId = row.id;
                if (data[rowId]) {
                    checkboxes.forEach((cb, idx) => {
                        if (data[rowId].checks && data[rowId].checks[idx] !== undefined) {
                            cb.checked = data[rowId].checks[idx];
                        }
                    });
                    guestInputs.forEach((inp, idx) => {
                        if (data[rowId].guests && data[rowId].guests[idx] !== undefined) {
                            inp.value = data[rowId].guests[idx];
                        }
                    });
                }
            });
            if (data.startDate) {
                document.getElementById('startDate').value = data.startDate;
            }
        } catch (e) {}
    }

    function saveToStorage() {
        const data = { startDate: document.getElementById('startDate').value };
        rows.forEach(row => {
            const checkboxes = row.querySelectorAll('input.clean-check');
            const guestInputs = row.querySelectorAll('input.guest-count');
            const checks = Array.from(checkboxes).map(cb => cb.checked);
            const guests = Array.from(guestInputs).map(inp => parseInt(inp.value, 10) || 0);
            data[row.id] = { checks, guests };
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    // ================== DATE HANDLING ==================
    const startDateInput = document.getElementById('startDate');
    const headers = {
        Tue: document.getElementById('headTue'),
        Wed: document.getElementById('headWed'),
        Thu: document.getElementById('headThu'),
        Fri: document.getElementById('headFri'),
        Sat: document.getElementById('headSat'),
        Sun: document.getElementById('headSun'),
        Mon: document.getElementById('headMon')
    };

    function formatDate(date) {
        const d = new Date(date);
        const day = d.getDate().toString().padStart(2,'0');
        const month = (d.getMonth()+1).toString().padStart(2,'0');
        return `${day}/${month}`;
    }

    function updateHeaders() {
        if (!startDateInput.value) return;
        const startDate = new Date(startDateInput.value + 'T12:00:00');
        if (isNaN(startDate)) return;
        dayIds.forEach((day, index) => {
            const current = new Date(startDate);
            current.setDate(startDate.getDate() + index);
            headers[day].textContent = `${day} ${formatDate(current)}`;
        });
        saveToStorage();
    }

    startDateInput.addEventListener('change', updateHeaders);

    // Default to next Tuesday
    const today = new Date();
    const dayOfWeek = today.getDay();
    const daysUntilTuesday = (2 - dayOfWeek + 7) % 7;
    const nextTue = new Date(today);
    nextTue.setDate(today.getDate() + daysUntilTuesday);
    const year = nextTue.getFullYear();
    const month = (nextTue.getMonth() + 1).toString().padStart(2,'0');
    const day = nextTue.getDate().toString().padStart(2,'0');
    const defaultDate = `${year}-${month}-${day}`;
    if (!startDateInput.value) {
        startDateInput.value = defaultDate;
    }

    // ================== UPDATE TOTALS & BADGE ==================
    function updateRowTotal(row) {
        const guestInputs = row.querySelectorAll('input.guest-count');
        let total = 0;
        guestInputs.forEach(input => {
            total += parseInt(input.value, 10) || 0;
        });
        row.querySelector('.total-col').textContent = total;
    }

    function updateBadge() {
        const allCheckboxes = document.querySelectorAll('input.clean-check');
        const allChecked = Array.from(allCheckboxes).every(cb => cb.checked);
        document.getElementById('completeBadge').style.display = allChecked ? 'inline-flex' : 'none';
    }

    rows.forEach(row => {
        const guestInputs = row.querySelectorAll('input.guest-count');
        guestInputs.forEach(input => {
            input.addEventListener('input', () => { updateRowTotal(row); saveToStorage(); });
            input.addEventListener('blur', () => { updateRowTotal(row); saveToStorage(); });
        });
        const checkboxes = row.querySelectorAll('input.clean-check');
        checkboxes.forEach(cb => {
            cb.addEventListener('change', () => { updateBadge(); saveToStorage(); });
        });
        updateRowTotal(row);
    });

    loadFromStorage();
    updateHeaders();
    updateBadge();

    // ================== HELPER ==================
    function getDates() {
        const dates = {};
        for (let day of dayIds) {
            dates[day] = headers[day].textContent;
        }
        return dates;
    }

    // ================== SUMMARY WINDOWS (optional) ==================
    window.openCleanerSheet = function() {
        const dates = getDates();
        const dayRoomData = {};
        for (let day of dayIds) dayRoomData[day] = [];
        rows.forEach(row => {
            const roomName = roomNames[row.id];
            const checkboxes = row.querySelectorAll('input.clean-check');
            checkboxes.forEach((cb, index) => {
                if (cb.checked) dayRoomData[dayIds[index]].push(roomName);
            });
        });
        let html = `<html><head><title>Cleaner summary</title><meta name="viewport" content="width=device-width, initial-scale=1"><style>body{font-family:system-ui;padding:1rem;}</style></head><body><h1>Reggio Calabria Club</h1><p>🧹 Cleaner summary · week starting ${dates.Tue}</p>`;
        for (let day of dayIds) {
            if (dayRoomData[day].length) {
                html += `<h3>${dates[day]}</h3><ul>`;
                dayRoomData[day].forEach(r => html += `<li>${r}</li>`);
                html += `</ul>`;
            }
        }
        html += `</body></html>`;
        const w = window.open('');
        w.document.write(html);
        w.document.close();
    };

    window.openDrinksSheet = function() {
        const dates = getDates();
        const dayDrinks = {};
        for (let day of dayIds) dayDrinks[day] = [];
        rows.forEach(row => {
            const roomName = roomNames[row.id];
            const guestInputs = row.querySelectorAll('input.guest-count');
            guestInputs.forEach((input, index) => {
                const guests = parseInt(input.value, 10) || 0;
                dayDrinks[dayIds[index]].push({ room: roomName, guests });
            });
        });
        let html = `<html><head><title>Drinks summary</title><meta name="viewport" content="width=device-width, initial-scale=1"><style>body{font-family:system-ui;padding:1rem;}table{border-collapse:collapse;width:100%;}th{background:#f1f5f9;}</style></head><body><h1>Reggio Calabria Club</h1><p>🍷 Drinks summary · week starting ${dates.Tue}</p>`;
        let grandTotal = 0;
        for (let day of dayIds) {
            const rowsData = dayDrinks[day];
            const dayTotal = rowsData.reduce((acc, r) => acc + r.guests, 0);
            if (dayTotal === 0) continue;
            grandTotal += dayTotal;
            html += `<h3>${dates[day]}</h3><table><tr><th>Room</th><th>Guests</th></tr>`;
            rowsData.forEach(r => html += `<tr><td>${r.room}</td><td>${r.guests}</td></tr>`);
            html += `</table><p><strong>Day total: ${dayTotal}</strong></p>`;
        }
        html += `<h2>🍷 Total guests: ${grandTotal}</h2>`;
        html += `</body></html>`;
        const w = window.open('');
        w.document.write(html);
        w.document.close();
    };

    // ================== DRINK BREAKDOWN FUNCTION ==================
    function getDrinkBreakdown(totalGuests) {
        // 90 bottles per 750 guests
        const bottlesPerPerson = 90 / 750;
        const totalBottles = Math.round(totalGuests * bottlesPerPerson);
        // Percentages
        const pct = {
            'Cola': 0.4,
            'Lemon squash': 0.4,
            'Cola (no sugar)': 0.1,
            'Lemonade': 0.05,
            'Soda water': 0.05,
            'Tonic water': 0.025,
            'Ginger ale': 0.025
        };
        const breakdown = [];
        for (let [drink, fraction] of Object.entries(pct)) {
            let bottles = Math.round(totalBottles * fraction);
            breakdown.push({ drink, bottles });
        }
        // Adjust rounding errors: force sum to equal totalBottles
        const sum = breakdown.reduce((acc, item) => acc + item.bottles, 0);
        if (sum !== totalBottles && breakdown.length > 0) {
            const diff = totalBottles - sum;
            // Add diff to the largest category
            let maxIndex = 0;
            for (let i = 1; i < breakdown.length; i++) {
                if (breakdown[i].bottles > breakdown[maxIndex].bottles) maxIndex = i;
            }
            breakdown[maxIndex].bottles += diff;
        }
        return { totalBottles, breakdown };
    }

    // ================== CONSOLIDATED PDF ==================
    window.downloadConsolidatedPDF = function() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const dates = getDates();

        doc.setFontSize(18);
        doc.text('Reggio Calabria Club', 14, 20);
        doc.setFontSize(11);
        doc.text(`Week starting ${dates.Tue}`, 14, 28);

        // ---- PAGE 1: CLEANING SUMMARY (only days with ticks) ----
        doc.setFontSize(14);
        doc.setFont(undefined, 'bold');
        doc.text('🧹 Cleaning summary', 14, 40);
        doc.setFont(undefined, 'normal');
        let y = 48;
        let cleaningExists = false;

        for (let day of dayIds) {
            const tickedRooms = [];
            rows.forEach(row => {
                const roomName = roomNames[row.id];
                const checkboxes = row.querySelectorAll('input.clean-check');
                checkboxes.forEach((cb, index) => {
                    if (cb.checked && dayIds[index] === day) {
                        tickedRooms.push(roomName);
                    }
                });
            });
            if (tickedRooms.length === 0) continue;
            cleaningExists = true;

            // Check if we need a new page
            if (y > 260) {
                doc.addPage();
                y = 20;
            }

            doc.setFontSize(11);
            doc.setFont(undefined, 'bold');
            doc.text(dates[day], 14, y);
            y += 5;
            doc.setFont(undefined, 'normal');
            tickedRooms.forEach(room => {
                doc.text(`• ${room}`, 18, y);
                y += 5;
            });
            y += 2;
        }

        if (!cleaningExists) {
            doc.text('No cleaning scheduled this week.', 14, y);
            y += 8;
        }

        // ---- PAGE 2: DRINK REQUIREMENTS ----
        doc.addPage();
        y = 20;

        // Calculate total guests
        let grandTotal = 0;
        rows.forEach(row => {
            const guestInputs = row.querySelectorAll('input.guest-count');
            guestInputs.forEach(input => {
                grandTotal += parseInt(input.value, 10) || 0;
            });
        });

        doc.setFontSize(16);
        doc.setFont(undefined, 'bold');
        doc.text('🍷 Drink requirements', 14, y);
        y += 8;

        doc.setFontSize(11);
        doc.setFont(undefined, 'normal');
        doc.text(`Total guests for the week: ${grandTotal}`, 14, y);
        y += 6;

        const { totalBottles, breakdown } = getDrinkBreakdown(grandTotal);
        doc.text(`Based on 90 bottles per 750 guests`, 14, y);
        y += 6;
        doc.setFont(undefined, 'bold');
        doc.text(`Total bottles needed: ${totalBottles}`, 14, y);
        y += 8;

        // Breakdown table
        const breakdownRows = breakdown.map(item => [item.drink, item.bottles.toString()]);
        doc.autoTable({
            startY: y,
            head: [['Drink', 'Bottles']],
            body: breakdownRows,
            theme: 'striped',
            headStyles: { fillColor: [139, 30, 30] },
            margin: { left: 14, right: 14 }
        });

        doc.save('Reggio_Calabria_Club.pdf');
    };
})();
</script>
</body>
</html>
